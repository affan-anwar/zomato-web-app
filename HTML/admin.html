<!DOCTYPE html>
<html lang="en">
<head>
<title>Admin Panel | Zomato Clone</title>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<header>
  <div class="logo">
    <img src="../image/logo.png" alt="Logo"/>
  </div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>
</header>

<main class="form-container">
  <div class="form-box">
    <h2>Admin Panel</h2>

    <div class="input-box">
      <input type="text" id="adminName" placeholder="Restaurant Name"/>
    </div>

    <div class="input-box">
      <input type="text" id="adminLocation" placeholder="Location"/>
    </div>

    <div class="input-box">
      <input type="text" id="adminCuisine" placeholder="Cuisine"/>
    </div>

    <div class="input-box">
      <input type="number" id="adminRating" placeholder="Rating (1-5)" min="1" max="5"/>
    </div>

    <button class="btn" onclick="adminAdd()">Add Restaurant</button>

    <p id="adminMsg"></p>

    <div id="restaurantList" style="margin-top:20px; width:100%;"></div>
  </div>
</main>

<footer>
  <p>&copy; 2026 Zomato Clone | All rights reserved</p>
</footer>

<script src="../JavaScript/script.js"></script>
</body>
</html>
