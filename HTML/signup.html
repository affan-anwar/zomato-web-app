<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Clone | Signup</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">
        <img src="../image/logo.png" alt="Zomato Logo">
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="investor.html">Investor Relations</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>
</header>

<!-- MAIN -->
<main class="form-container">
    <div class="ring-wrapper">

        <svg class="ring" viewBox="0 0 360 360">
            <circle cx="180" cy="180" r="173"/>
        </svg>

        <svg class="ring2" viewBox="0 0 344 344">
            <circle cx="172" cy="172" r="165"/>
        </svg>

        <div class="form-box">
            <h2>Signup</h2>

            <div class="input-box">
                <input type="text" id="name" placeholder="Full Name" required>
            </div>

            <div class="input-box">
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-box">
                <input type="password" id="password" placeholder="Password" minlength="6" required>
            </div>

            <button type="submit" class="btn">Create Account</button>

            <div class="login-link">
                Already have an account? <a href="login.html">Login</a>
            </div>

            <p id="message"></p>
        </div>

    </div>
</main>

<!-- FOOTER -->
<footer>
    <p>&copy; 2026 Zomato Clone | All rights reserved</p>
</footer>

<script src="../JavaScript/script.js"></script>
</body>
</html>
