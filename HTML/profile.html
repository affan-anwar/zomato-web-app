<!DOCTYPE html>
<html lang="en">
<head>
<title>Profile | Zomato Clone</title>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<header>
  <div class="logo">
    <img src="../image/logo.png" alt="Logo"/>
  </div>
  <nav>
    <ul>
      <a href="../index.html">Home</a>
      <li><a href="orders.html">Orders</a></li>
      <li><a href="cart.html">Cart</a></li>
    </ul>
  </nav>
</header>

<main>
  <div class="profile-card">

    <div class="profile-avatar">👤</div>

    <h2 id="profileName" class="profile-name">Guest User</h2>
    <p id="profileEmail" class="profile-email">No email found</p>

    <div class="profile-stats">

      <div class="profile-stat-row">
        <span class="stat-label">Orders</span>
        <span id="profileOrders" class="stat-value">0</span>
      </div>

      <div class="profile-stat-row">
        <span class="stat-label">Cart Items</span>
        <span id="profileCart" class="stat-value">0</span>
      </div>

      <div class="profile-stat-row">
        <span class="stat-label">Member Since</span>
        <span id="profileDate" class="stat-value">2026</span>
      </div>

    </div>

    <button class="btn" onclick="logoutUser()">Logout</button>

  </div>
</main>

<footer>
  <p>&copy; 2026 Zomato Clone | All rights reserved</p>
</footer>

<script src="../JavaScript/script.js"></script>
</body>
</html>
