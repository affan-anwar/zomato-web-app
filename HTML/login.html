<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Clone | Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">
        <img src="../image/logo.png" alt="Zomato Logo">
    </div>

    <nav>
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="investor.html">Investor Relations</a></li>
            <li><a href="signup.html">Signup</a></li>
        </ul>
    </nav>
</header>

<!-- MAIN -->
<main class="form-container">
    <div class="ring-wrapper">

        <svg class="ring" viewBox="0 0 340 340">
            <circle cx="170" cy="170" r="163"/>
        </svg>

        <svg class="ring2" viewBox="0 0 324 324">
            <circle cx="162" cy="162" r="155"/>
        </svg>

        <div class="form-box">
            <h2>Login</h2>

            <div class="input-box">
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-box">
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="forgot-password">
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="btn">Login</button>

            <div class="signup-link">
                Don't have an account? <a href="signup.html">Signup</a>
            </div>

            <p id="message"></p>
        </div>

    </div>
</main>

<!-- FOOTER -->
<footer>
    <p>&copy; 2026 Zomato Clone | All rights reserved</p>
</footer>

<script src="../JavaScript/script.js"></script>
</body>
</html>
